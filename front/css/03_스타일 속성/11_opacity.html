<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>opacity 예제</title>
    <style>
        /* 
        opacity(p.156)
        - 요소 사이의 투명도를 설정
        - 0 ~ 1 사이의 실수값을 지정, 0.01 0.3 등
        - 0이면 투명, 1이면 불투명
        - 부모 요소에 적용된 투명도가 자식요소에도 적용됨
        */
        .wrap{position: relative; height: 50px;}

        .box{position: absolute;
        
        top: 0; bottom: 0;
        left:0; right: 0;
        background-color: red; opacity: 1;}
        .box:hover{opacity: 0.3;}

        .container2{height: 50px; line-height: 50px; font-weight: bold;
        font-size: 30px; background-color: red;opacity: 0.5;}
        /* 여기서 투명도를 1로 해도 부모가 0.5이어서 부모보다 선명할 수 없음 */
        .box2{opacity: 1;}

        .container3{height: 50px; line-height: 50px; font-weight: bold;
        font-size: 30px; background-color: rgba(255,0,0,0.5);}
        
    </style>
</head>
<body>
    <h1>투명도 예제</h1>
    <div class="container1">
        <div class="wrap">
            <h1>안녕하세요. </h1>
            <div class="box">1</div>
        </div>
    </div>
    <h1>투명도 예제2</h1>
    <!-- 
    자식 요소의 투명도는 부모보다 선명할 수 없다
    > 부모의 투명도가 0.5이면 자식의 투명도를 1로 해도 1처럼 진하게 안보임
    -->
    <div class="container2">
        <div class="box2">opacity</div>
    </div>
    <div class="container3">
        <div class="box3">배경 색상에 raba()이용</div>
    </div>
</body>
</html>
