<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반응형 적용하기</title>
    <style>
/*     
    반응형 (p.201)
    - 웹을 보는 장치에 따라 보이는 화면이 다른 경우
    - m.naver.com
    - github.com

    반응형 적용 방법
    1. style 태그 안에 @media 쿼리를 이용
    2. style, link 태그에 media 속성을 이용
    
    적용방법1
    <스타일>
        @media screen and (max-width:최대화면크기) and (min-width:최소화면크기){
        선택자{
            속성 : 값; 속성 : 값}
        }
        </스타일>

    적용방법2
    <link href="xxx.css" media="screen and (max-width:최대화면크기) and (min-width:최소화면크기)">
    */

    /* 
    화면이 작을때 (600px 이하) 한줄에 박스가 1개씩
    화면이 보통일때 (600px 이상 1000px이하) 한줄에 박스가 3개씩
    화면이 클때(1000px이상) 한줄에 박스가
    */
    .box{height: 100px; background: paleturquoise; 
        /* 화면이 작을때(600px 이하)너비 */
        width: 100%; float: left;}
    
    /* box 클래스들 중 짝수번째 x
    짝수번째 요소들 중 클래스가 box가 있음? o */
    .box:nth-child(2n){background: pink;}
    
    /* @media screen and (min-width:600px){
        .box{width:33.333%;
        }
    }
    @media screen and (min-width:1000px){
        .box{width:16.666%;
        }
    } */

    /* @media screen and (max-width:600px){
        .box{width:100%;}
    }
     @media screen and (min-width:600px) and (max-width:1000px) {
        .box{width:33.333%;}
    }
     @media screen and (min-width:1000px){
        .box{width:16.666%;}
    } */
    </style>

    <link rel='stylesheet' href="18_반응형적용하기_L.css" media="screen and (min-width:1000px)">
    <link rel='stylesheet' href="18_반응형적용하기_M.css" media="screen and (min-width:600px) and (max-width:1000px)">
    <link rel='stylesheet' href="18_반응형적용하기_S.css" media="screen and (max-width:600px)">
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        </div>
</body>
</html>
