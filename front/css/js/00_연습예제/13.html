<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="text">
    <button id="btnAdd">추가</button>
     <button id="btnSave">로컬저장소에 저장</button>
     <h1>입력된 내용</h1>
     <ul class="list"></ul>
     <h1>저장된 내용</h1>
     <ul class="list-save"></ul>
    <script>
    /* 
    추가 버튼을 클릭하면 alert이 뜨도록 작업
    */

    //추가 버튼 선택
    const btn = document.querySelector('#btnAdd')

    //추가된 문구를 저장할 변수
    let list = [];
    
    //추가 버튼에 click 이벤트 등록 후 alert을 이용해서 구현
    btn.addEventListener('click', function(){
        //인풋 태그 요소 선택
        const input = document.querySelector('#text');
        // 인풋 태그 입력된 값을 가져옴
        let value = input.value;
        //가져온 값 등록
        // alert(value)

        //list에 value를 추가
        list.push(value);
        console.log(list);
        input.value = '';

        //id가 list인 요소를 선택
        const listt = document.querySelector('ul')
        // value를 이용하여 li태그로 된 문자열을 만듦
        let str = `<li>${value}</li>`;
        //id가 list인 요소 제일 뒤에 li태그로 된 문자열을 추가
        listt.innerHTML = listt.innerHTML + str;

    })

    //로컬 저장소에 저장 버튼을 선택
    const btnSave = document.querySelector('#btnSave')
    //로컬저장소 저장버튼에 클릭 이벤트 등록
    btnSave.addEventListener('click', function(){
    //alert으로 확인
        //alert();
        //list에 있는 내용을 로컬 스토리지에 저장함. 저장할 떄 key는 list로 지정
        localStorage.setItem("list",JSON.stringify(list));

        //로컬 저장소에 있는 list를 가져옴
        let set = JSON.parse(localStorage.getItem("list"));
        
        //가져온 리스트를 배열로 변경

        //아이디가 list-save인 요소를 선택
        const save = document.querySelector('#list-save')
        //반복문 : 배열의 0번지부터 배열의 크기보다 작을때까지 반복
        for(i = 0; i < set.length;++i){
            
            
            // 배열의 가져온 값을 이용하여 li태그 문자열로 만듦
            let strr = `<li>${set[i]}</li>`;
            //만든 문자열을 list-save인 요소 뒤에 추가
            save.innerHTML = save.innerHTML + strr;
        }
    })
    </script>
    
</body>
</html>
