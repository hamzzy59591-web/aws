<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연산자 예제</title>
</head>
<body>
    <script>
    /* 
    prompt를 이용하여 두 정수를 입력 받아 두 정수의 합을 alert으로 출력하는 코드를 작성하세요.
    
    */
    let num1 = prompt('숫자를 입력하세요','0');
    let num2 = prompt('숫자를 입력하세요','0');

    // alert(`${parseInt(num1)} + ${parseInt(num2)} = ${parseInt(num1)+ parseInt(num2)} `)

    let result = parseInt(num1) + parseInt(num2)
    alert(result)

    </script>
    
</body>
</html>
