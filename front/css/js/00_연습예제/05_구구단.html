<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구구단 예제</title>
</head>
<body>

<script>

let 숫자 = 1;

for( 숫자 = 1 ; 숫자 <= 9 ; ++숫자 ){
    document.write(`2 X ${숫자} = ${2 * 숫자}<br>`);
}

</script>
    
</body>
