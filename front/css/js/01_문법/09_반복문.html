<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반복문</title>
</head>
<body>
<script>
/* 
반복문
- 규칙적인 작업을 반복적으로 여러번할때 사용
- 예시) 구구단

for문
- 문법 
for(초기화; 조건식; 증감식){
    실행문;
}
선생님이 학생에게 1부터 10까지 숫자를 세라고 함
    - 초기화 : 조건식이나 실행문에서 사용할 변수를 초기화
    > 학생이 부를 첫 숫자를 지정
    - 조건식 : 조건식이 거짓이 되는 순간 반복문을 종료
    > 10까지 부르고 11되기전에 멈춤
    - 증감식 : 조건식에서 사용하는 변수를 증가/감소 시켜서 반복 횟수에 영향을 줌
    > 숫자를 1씩 증가
    - 실행문 
    > 숫자를 부름
 - 실행순서
    초기화 > 조건식(참이면) > 실행문 > 증감식 > 조건식(참이면) > 실행문 > 증감식 > 조건식(거짓이면) > 종료
*/

let 숫자 = 1;

for( 숫자 = 1 ; 숫자 <= 10 ; ++숫자 ){
    document.write(숫자+'' );
}

/* 
증감연산자
- ++, --
- 변수의 값이 1증가/감소
- 
*/
</script>
    
</body>
</html>
