<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM 텍스트 예제</title>
</head>
<body>
    <button id="btn">클릭</button>

    <div class="box">
        <div class="ineer" style="display: none;">안보임</div>
        <div>보임</div>
    </div>

    <div class="box2">
        <a href="#">링크</a>
    </div>
    <script>
    /* 
    텍스트 가져오기 : 태그 사이에 있는 텍스트를 가져옴
    1. 요소.innerText
        - 스타일에 영향을 받음, 자손 요소에 display: none; 요소가 있으면 글자를 못 읽음

    2. 요소.textContent
        - 스타일에 영향을 받지 않음
    */
   const btn = document.querySelector('#btn');
   let text = btn.innerText;
   console.log(text);

   const box = document.querySelector('.box');
   let boxText = box.innerText;
   console.log(boxText);
   let boxText2 = box.textContent;
   console.log(boxText2)

   btn.innerText = '버튼 클릭' ;

   /* 
   html 코드 수정 및 추가, 가져오기
   - 요소 안의 html 코드를 가져옴
   요소.innerHTML 
   */
  const box2 = document.querySelector('.box2');
  let htmlcode2 = box2.innerHTML;
  console.log(htmlcode2)
  //html 수정하기
  box2.innerHTML = '<button>버튼</button>';
  //html 추가하기
  box2.innerHTML = box2.innerHTML + '<button>버튼</button>';

    </script>
</body>
</html>
