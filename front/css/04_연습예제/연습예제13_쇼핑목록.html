<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쇼핑목록 연습예제</title>

    a{color: black; text-decoration: none;
    font-size: 20px; line-height: 20px;
    float: left;}

    .menu:hover{text-decoration: underline;}

    .wrap::after{content: '';display: block;clear: both;}

    .dot{
        padding-left: 20px; position: relative;
    }

    .dot::before{content: ''; width: 4px; height: 4px; background: black;
    border-radius: 50%;
    position: absolute; top: 8px; left: 8px;}
       
    </style>

    <style>
    .wrap-container .menu{float: none;}
    .wrap-container{display: flex;}
    .dot2{width: 4px; height: 4px; background: black;
    border-radius: 50%; margin: 8px 8px 0;}

    </style>
</head>
<body>
    <div class="container">
            <div class="wrap">
                <div class="list">
                    <a href="//coupang.com" class="menu">쿠팡</a>
                    <a href="//gmarket.co.kr" class="menu dot">G마켓</a>
                    <a href="//auction.co.kr" class="menu dot">옥션</a>
                </div>
            </div>
    </div>

        <div class="container">
            <div class="wrap wrap-container">
                    <a href="#" class="menu">쿠팡</a>
                    <span class="dot2"></span>
                    <a href="#" class="menu">G마켓</a>
                    <span class="dot2"></span>
                    <a href="#" class="menu">옥션</a>
            </div>
    </div>
    
</body>
