<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>복습</title>
    <style>
        /* 

        태그의 구성
        1. 단일 태그
        <태그명 속성="값" 속성 class="값1 값2" id="값">
        2. 쌍태그
        <태그명 속성="값" 속성 class="값1 값3" id="값"></태그명>
        
        기본 선택자
        1.모든 선택자 : 0
        *{} : 글꼴, 여백을 제거할 때 사용 
        
        2.태그 선택자 : 1
        a{} : 밑줄이나 글자색을 변경할 때 사용

        3. 클래스 선택자 : 10
        .값1{} : 태그의 class 속성의 값이 일치하는 요소를 선택

        4. 아이디 선택자 : 100
        #id1{} 

        우선 순위가 필요한 이유?
        - 여러 선택자가 같은 일(스타일)을 시킬 때 누구 말을 들을지 결정하기
        > 우선순위가 높은 선택자 말을 따르면 됨
        > 순위가 같을 경우 코드 순서상 나중(밑)에 있는 선택자를 따르면 됨

        */
        a{color: black;text-decoration: none;}
        
        


    </style>
</head>
<body>
    <a href="//naver.com" target="_blank">네이버로 이동</a>
</body>
</html>
