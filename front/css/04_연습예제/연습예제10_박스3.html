<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스 예제</title>
    <style>
        .container{border: 3px solid black; width: 500px;}
        .wrap{padding: 10px; background-color: skyblue;}
        .box{background-color: red;height: 100px;float: left; 
            width: calc((100% - 3 * 10px) / 4) ;}
            /* 파란 박스 안에 박스 n개를 추가한다면 가운데 여백은 n-1개, 박스 개수는 n개 이기 때문에
            calc((100%-n-1) * 여백크기 / n ) */
        .wrap::after{content: '';display: block;clear: both;}
        .box + .box {margin-left: 10px;}

    </style>
</head>
<body>
   <div class="container">
    <!-- 
    wrap 박스를 추가한 이유는 파란 박스 영역이 500xp이어야 하고, padding으로 박스들을 배치하더라도
    크기가 변경되지 않게 하기 위해서 추가
    > wrap이 없다면 container의 width가 480px으로 해야됨
     -->
    <div class="wrap">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
   </div> 
</body>
</html>
