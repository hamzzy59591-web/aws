<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주말 과제</title>
    <style>
        .container{width: 500px; border:  3px solid black;background-color: blue;}
        .wrap{padding: 10px;}
        .box{width: calc((100% - 10px) / 2);;height: 100px; background-color: red; float: left;box-sizing: border-box;}
        .wrap::after{content: '';clear: both;display: block;}
        .box + .box {margin-left: 10px;}
    
        
        
        
    </style>
</head>
<body>
    <div class="container">
        <div class="wrap">
        <div class="box"></div>
        <div class="box"></div>
        </div>
    </div>
    
</body>
</html>
