<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스 연습예제2</title>
    <style>
        .container{border: 3px solid black}
        .wrap{padding: 10px;}
        .box{height: 50px; background-color: red;}
        .box+.box{margin-top: 10px;}
        /* 
        **영역**
        부모-형제 > 패딩
        형제-형제 > 마진 
        block 태그들은 너비가 기본값이 100% > 부모 컨텐츠 크기를 가져옴
        */
        
    </style>
</head>
<body>

    <div class="container">
        <div class="wrap">
            <div class="box"></div>
            <div class="box"></div>
        
        </div>
    </div>
    
</body>
</html>
