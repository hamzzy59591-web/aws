<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 언론사 예제</title>
    <style>
        .container{width: 150px; height: 60px; overflow: hidden;
        box-shadow: 0 0 2px rgb(126, 2, 2); border-radius: 4px;
        position: relative;}
        
        .container:hover .box{position:absolute; left: 0; right: 0; top: 0; bottom: 0; 
            background: white; padding: 20px; line-height: 20px; font-size: 15px;
        text-align: center;}
    </style>
</head>
<body>
    <div class="container">
        <img src="../img/문화일보.png" alt="문화일보" width="150" height="60">
        <div class="box">클릭</div>
    </div>
</body>
</html>
