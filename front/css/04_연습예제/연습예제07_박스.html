<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스 예제</title>
    <style>
        
        .container{width: 300px;border: 3px solid black}
        .wrap{padding: 30px;}
        .box{width: 100%; height: 100px; background-color: red;}

    </style>
</head>
<body>
    <!-- 
    검정색 container 빨간색보다 10px 큼
    빨간색 box 너비 280px 높이 100px
    -->
    <div class="container">
        <div class="wrap">
            <div class="box"></div>
        </div>
        
    </div>
    
</body>
</html>
